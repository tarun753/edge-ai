<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent; overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none; height: 100vh;
  }

  .whisper {
    position: absolute;
    bottom: 10px; left: 10px; right: 10px;
    padding: 16px 20px;
    border-radius: 18px;
    display: flex; align-items: center; gap: 14px;
    opacity: 0;
    transform: translateY(20px) scale(0.94);
    transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;

    background: rgba(8, 8, 14, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.07);
    box-shadow:
      0 12px 48px rgba(0, 0, 0, 0.7),
      0 2px 0 rgba(255, 255, 255, 0.02) inset;
    backdrop-filter: blur(40px) saturate(1.4);
    -webkit-backdrop-filter: blur(40px) saturate(1.4);
  }

  .whisper.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  /* Urgency glow ring */
  .whisper::before {
    content: ''; position: absolute; inset: -1px;
    border-radius: 19px; padding: 1px;
    background: linear-gradient(135deg, transparent 30%, var(--glow-color, rgba(99,102,241,0.3)) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    opacity: 0; transition: opacity 0.4s ease;
  }
  .whisper.visible::before { opacity: 1; }

  .whisper.urgency-high { --glow-color: rgba(249,115,22,0.5);
    box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 0 48px rgba(249,115,22,0.06), 0 2px 0 rgba(255,255,255,0.02) inset;
  }
  .whisper.urgency-normal { --glow-color: rgba(99,102,241,0.4);
    box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 0 32px rgba(99,102,241,0.04), 0 2px 0 rgba(255,255,255,0.02) inset;
  }
  .whisper.urgency-low { --glow-color: rgba(100,116,139,0.2); }
  .whisper.urgency-audio { --glow-color: rgba(16,185,129,0.45);
    box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 0 40px rgba(16,185,129,0.05), 0 2px 0 rgba(255,255,255,0.02) inset;
  }

  /* Icon */
  .icon-wrap {
    width: 38px; height: 38px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.05);
    transition: all 0.3s;
  }
  .urgency-high .icon-wrap { background: rgba(249,115,22,0.08); border-color: rgba(249,115,22,0.12); }
  .urgency-normal .icon-wrap { background: rgba(99,102,241,0.08); border-color: rgba(99,102,241,0.1); }
  .urgency-audio .icon-wrap { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.12); }

  .body { flex: 1; min-width: 0; }

  .tag {
    font-size: 8.5px; font-weight: 800;
    letter-spacing: 0.14em; text-transform: uppercase;
    margin-bottom: 4px; color: #6366f1;
  }
  .tag.high { color: #f97316; }
  .tag.low { color: #64748b; }
  .tag.audio { color: #10b981; }

  .text {
    font-size: 13.5px; font-weight: 500;
    color: #f1f5f9; line-height: 1.35;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: -0.01em;
  }

  /* Right side */
  .indicator { flex-shrink: 0; display: flex; align-items: center; }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #10b981;
    box-shadow: 0 0 8px rgba(16,185,129,0.4);
    animation: breathe 2.2s ease-in-out infinite;
  }
  .audio-wave {
    display: none; gap: 2px; align-items: center; height: 20px;
  }
  .audio-wave.active { display: flex; }
  .audio-wave .bar {
    width: 3px; border-radius: 2px; background: #10b981;
    box-shadow: 0 0 4px rgba(16,185,129,0.3);
    animation: wave 0.55s ease-in-out infinite;
  }
  .audio-wave .bar:nth-child(1) { animation-delay: 0s; }
  .audio-wave .bar:nth-child(2) { animation-delay: 0.07s; }
  .audio-wave .bar:nth-child(3) { animation-delay: 0.14s; }
  .audio-wave .bar:nth-child(4) { animation-delay: 0.1s; }
  .audio-wave .bar:nth-child(5) { animation-delay: 0.03s; }

  /* Progress bar */
  .progress {
    position: absolute; bottom: 0; left: 24px; right: 24px;
    height: 2px; border-radius: 1px;
    background: rgba(255, 255, 255, 0.03);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 1px;
    background: linear-gradient(90deg, var(--glow-color, #6366f1), transparent);
    width: 100%;
    transform-origin: left;
    animation: shrink 7s linear forwards;
  }

  /* EDGE watermark */
  .watermark {
    position: absolute; top: 8px; right: 16px;
    font-size: 7px; font-weight: 800; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(255,255,255,0.06);
  }

  @keyframes breathe { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }
  @keyframes wave { 0%,100%{height:3px} 50%{height:18px} }
  @keyframes shrink { from{transform:scaleX(1)} to{transform:scaleX(0)} }
</style>
</head>
<body>

<div class="whisper" id="w">
  <div class="watermark">EDGE</div>
  <div class="icon-wrap" id="icon">⚡</div>
  <div class="body">
    <div class="tag" id="tag">Insight</div>
    <div class="text" id="text">—</div>
  </div>
  <div class="indicator">
    <div class="live-dot" id="liveDot"></div>
    <div class="audio-wave" id="audioWave">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
  </div>
  <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
</div>

<script>
const ICONS = {
  objection:'🛡️', buying_signal:'🚀', stall:'⏸️',
  competitor:'⚔️', decision_maker:'👥', engagement:'💡', insight:'⚡',
};
const LABELS = {
  objection:'Objection', buying_signal:'Buying Signal', stall:'Stall Tactic',
  competitor:'Competitor', decision_maker:'Decision Maker',
  engagement:'Engagement', insight:'Insight',
};
let hideTimer = null;

window.edge.onWhisper((data) => {
  const el = document.getElementById('w');
  const icon = document.getElementById('icon');
  const tag = document.getElementById('tag');
  const text = document.getElementById('text');
  const liveDot = document.getElementById('liveDot');
  const audioWave = document.getElementById('audioWave');
  const pf = document.getElementById('progressFill');

  // Restart progress
  pf.style.animation = 'none';
  void pf.offsetWidth;
  pf.style.animation = 'shrink 7s linear forwards';

  if (data.isAudio) {
    icon.textContent = '🎧';
    tag.textContent = 'AI COACHING';
    tag.className = 'tag audio';
    text.textContent = 'Whispered in your ear';
    el.className = 'whisper visible urgency-audio';
    liveDot.style.display = 'none';
    audioWave.classList.add('active');
  } else {
    icon.textContent = ICONS[data.category] || '⚡';
    tag.textContent = LABELS[data.category] || 'Insight';
    text.textContent = data.text;
    const urg = data.urgency || 'normal';
    tag.className = 'tag' + (urg === 'high' ? ' high' : urg === 'low' ? ' low' : '');
    el.className = 'whisper visible urgency-' + urg;
    liveDot.style.display = '';
    audioWave.classList.remove('active');
  }

  if (hideTimer) clearTimeout(hideTimer);
  hideTimer = setTimeout(() => el.classList.remove('visible'), 7000);
});

window.edge.onHide(() => document.getElementById('w').classList.remove('visible'));
</script>
</body>
</html>
