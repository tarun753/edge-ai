<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    overflow: hidden;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    height: 100vh;
  }

  .whisper {
    position: absolute;
    bottom: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    border-radius: 14px;

    background: rgba(10, 10, 10, 0.94);
    border: 1px solid rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(40px) saturate(1.5);
    -webkit-backdrop-filter: blur(40px) saturate(1.5);

    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.25s ease, transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
  }
  .whisper.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Left accent bar */
  .bar {
    width: 2px;
    align-self: stretch;
    border-radius: 1px;
    background: #444;
    flex-shrink: 0;
    transition: background 0.3s ease;
  }
  .whisper.high .bar { background: #d4915e; }
  .whisper.normal .bar { background: #888; }
  .whisper.low .bar { background: #444; }
  .whisper.audio .bar { background: #c8ff00; }

  .content { flex: 1; min-width: 0; }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 5px;
    transition: color 0.3s;
  }
  .whisper.high .tag { color: #d4915e; }
  .whisper.audio .tag { color: #c8ff00; }

  .text {
    font-size: 13.5px;
    font-weight: 400;
    color: #ccc;
    line-height: 1.4;
    letter-spacing: -0.01em;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* Progress — thin line at bottom */
  .progress {
    position: absolute;
    bottom: 0;
    left: 18px;
    right: 18px;
    height: 1px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 0.5px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 100%;
    background: rgba(255, 255, 255, 0.12);
    transform-origin: right;
    animation: shrink 7s linear forwards;
  }

  @keyframes shrink {
    from { transform: scaleX(1); }
    to { transform: scaleX(0); }
  }
</style>
</head>
<body>

<div class="whisper" id="w">
  <div class="bar"></div>
  <div class="content">
    <div class="tag" id="tag">Insight</div>
    <div class="text" id="text"></div>
  </div>
  <div class="progress"><div class="progress-fill" id="pf"></div></div>
</div>

<script>
const LABELS = {
  objection:'Objection', buying_signal:'Buying signal', stall:'Stall',
  competitor:'Competitor', decision_maker:'Decision maker',
  engagement:'Engagement', insight:'Insight',
};
let hideTimer = null;

window.edge.onWhisper((data) => {
  const el = document.getElementById('w');
  const tag = document.getElementById('tag');
  const text = document.getElementById('text');
  const pf = document.getElementById('pf');

  // Restart progress
  pf.style.animation = 'none';
  void pf.offsetWidth;
  pf.style.animation = 'shrink 7s linear forwards';

  if (data.isAudio) {
    tag.textContent = 'Whisper';
    text.textContent = 'Coaching delivered.';
    el.className = 'whisper visible audio';
  } else {
    const urg = data.urgency || 'normal';
    tag.textContent = LABELS[data.category] || 'Insight';
    text.textContent = data.text;
    el.className = 'whisper visible ' + urg;
  }

  if (hideTimer) clearTimeout(hideTimer);
  hideTimer = setTimeout(() => el.classList.remove('visible'), 7000);
});

window.edge.onHide(() => document.getElementById('w').classList.remove('visible'));
</script>
</body>
</html>
