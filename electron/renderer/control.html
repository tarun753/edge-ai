<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EDGE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #1a1a1a;
    --text: #e0e0e0;
    --text-2: #777;
    --text-3: #444;
    --accent: #c8ff00;
    --danger: #ff4444;
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    letter-spacing: -0.01em;
  }

  /* ── Titlebar ── */
  .titlebar {
    height: 52px;
    -webkit-app-region: drag;
    display: flex;
    align-items: center;
    padding: 0 20px 0 78px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .wordmark {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text);
  }

  .status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    -webkit-app-region: no-drag;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-3);
    transition: background 0.6s ease;
  }
  .status-dot.live {
    background: var(--accent);
    box-shadow: 0 0 8px rgba(200, 255, 0, 0.4);
    animation: breathe 2.4s ease-in-out infinite;
  }
  .status-dot.connecting {
    background: var(--text-2);
    animation: blink 1s ease infinite;
  }
  .status-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--text-3);
    letter-spacing: 0.06em;
    transition: color 0.6s ease;
  }
  .status-label.live { color: var(--accent); }
  .status-label.connecting { color: var(--text-2); }

  /* ── Scroll ── */
  .main {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .main::-webkit-scrollbar { display: none; }

  /* ── Action area ── */
  .action-area {
    padding: 32px 24px 20px;
  }

  .action-desc {
    font-size: 12.5px;
    font-weight: 300;
    color: var(--text-2);
    line-height: 1.65;
    margin-bottom: 28px;
    max-width: 280px;
  }

  .btn-begin {
    width: 100%;
    height: 48px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 10px;
    transition: all 0.2s ease;
    outline: none;
    -webkit-app-region: no-drag;
  }
  .btn-begin:hover {
    background: var(--accent);
    color: #0a0a0a;
  }
  .btn-begin:active { transform: scale(0.98); }
  .btn-begin:disabled {
    opacity: 0.2;
    cursor: not-allowed;
    transform: none;
  }

  .btn-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 12px;
  }

  .btn-text {
    font-size: 11px;
    font-weight: 400;
    color: var(--text-3);
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    padding: 6px 0;
    transition: color 0.15s;
    -webkit-app-region: no-drag;
    letter-spacing: 0.01em;
  }
  .btn-text:hover { color: var(--text-2); }

  .btn-end {
    width: 100%;
    height: 44px;
    border: 1px solid #2a1a1a;
    background: rgba(255, 40, 40, 0.04);
    color: #cc4444;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    border-radius: 10px;
    transition: all 0.15s ease;
    outline: none;
    -webkit-app-region: no-drag;
  }
  .btn-end:hover {
    background: rgba(255, 40, 40, 0.08);
    border-color: #3a1a1a;
  }
  .btn-end:active { transform: scale(0.98); }

  /* ── Caps row ── */
  .caps-row {
    display: none;
    gap: 20px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
  }
  .cap-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cap-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-3);
    transition: all 0.4s ease;
  }
  .cap-dot.on { background: var(--accent); box-shadow: 0 0 6px rgba(200,255,0,0.3); }
  .cap-name {
    font-family: var(--mono);
    font-size: 9.5px;
    font-weight: 500;
    color: var(--text-3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.4s ease;
  }
  .cap-name.on { color: var(--text-2); }

  /* ── Keyboard hint ── */
  .hint {
    display: none;
    padding: 0 24px 16px;
    font-size: 10px;
    color: var(--text-3);
  }
  .hint kbd {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-2);
    background: #161616;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
  }

  /* ── Feedback ── */
  .feedback {
    display: none;
    padding: 10px 24px;
    font-size: 11px;
    line-height: 1.5;
    font-weight: 400;
  }
  .feedback.info { color: var(--text-2); }
  .feedback.error { color: var(--danger); }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 24px;
  }

  /* ── Log ── */
  .log-header {
    padding: 16px 24px 10px;
    font-family: var(--mono);
    font-size: 9.5px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
  }

  .log-empty {
    padding: 32px 24px;
    font-size: 12px;
    font-weight: 300;
    color: var(--text-3);
    line-height: 1.7;
  }

  .log-list { padding: 0 0 20px; }

  .log-item {
    display: flex;
    gap: 14px;
    padding: 10px 24px;
    animation: fadeUp 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    transition: background 0.15s;
  }
  .log-item:hover { background: rgba(255,255,255,0.015); }

  .log-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-3);
    flex-shrink: 0;
    padding-top: 1px;
    font-variant-numeric: tabular-nums;
  }

  .log-content { flex: 1; min-width: 0; }

  .log-tag {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 3px;
    color: var(--text-3);
  }
  .log-tag.high { color: #d4915e; }
  .log-tag.audio { color: var(--accent); }

  .log-text {
    font-size: 12.5px;
    font-weight: 400;
    color: var(--text-2);
    line-height: 1.55;
  }

  .log-bar {
    width: 2px;
    flex-shrink: 0;
    border-radius: 1px;
    background: var(--border);
    align-self: stretch;
    transition: background 0.3s;
  }
  .log-item.high .log-bar { background: #d4915e; }
  .log-item.audio .log-bar { background: var(--accent); }

  /* ── Animations ── */
  @keyframes breathe {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.15; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="titlebar">
  <span class="wordmark">Edge</span>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-label" id="statusLabel">idle</span>
  </div>
</div>

<div class="caps-row" id="caps">
  <div class="cap-item"><div class="cap-dot" id="capMicDot"></div><span class="cap-name" id="capMicName">mic</span></div>
  <div class="cap-item"><div class="cap-dot" id="capScreenDot"></div><span class="cap-name" id="capScreenName">screen</span></div>
  <div class="cap-item"><div class="cap-dot" id="capAIDot"></div><span class="cap-name" id="capAIName">gemini</span></div>
</div>

<div class="main">
  <div class="feedback info" id="infoBox"></div>
  <div class="feedback error" id="errBox"></div>

  <div id="startGroup">
    <div class="action-area">
      <p class="action-desc">
        Listens to your conversation. Reads your screen. Whispers the right move — invisible to the other side.
      </p>
      <button class="btn-begin" id="btnLive">Begin session</button>
      <div class="btn-row">
        <button class="btn-text" id="btnDemo">try demo</button>
      </div>
    </div>
  </div>

  <div id="liveGroup" style="display:none">
    <div class="action-area">
      <button class="btn-end" id="btnStop">End session</button>
      <div class="hint" id="hint">
        <kbd>⌘⇧Space</kbd> whisper &nbsp;&middot;&nbsp; <kbd>⌘⇧H</kbd> hide
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="log-header">Activity</div>
  <div id="log" class="log-list">
    <div class="log-empty" id="logEmpty">Waiting for session.</div>
  </div>
</div>

<script>
const LABELS = {
  objection:'Objection', buying_signal:'Buying signal', stall:'Stall',
  competitor:'Competitor', decision_maker:'Decision maker',
  engagement:'Engagement', insight:'Insight',
};
const DEMO = [
  {text:"Competitor mentioned \u2014 ask what matters most in their decision.", urgency:'high', category:'competitor'},
  {text:"Budget stall. Reframe: is this a timing or priority issue?", urgency:'high', category:'objection'},
  {text:"Buying signal. Stop selling. Ask what getting started looks like.", urgency:'normal', category:'buying_signal'},
  {text:"Hidden decision maker. Ask who else should be involved.", urgency:'normal', category:'decision_maker'},
  {text:"Energy dropping. Pivot to what would make this a no-brainer.", urgency:'low', category:'engagement'},
  {text:"Pain point surfaced. Mirror it back to them.", urgency:'high', category:'insight'},
  {text:"They\u2019re stalling. Ask what needs to be true to move forward today.", urgency:'normal', category:'stall'},
];

let ws=null, micCtx=null, processor=null, micStream=null, screenStream=null, screenInterval=null;
let demoInterval=null, demoIdx=0, logEmpty=true;

function setStatus(s) {
  const dot = document.getElementById('statusDot');
  const label = document.getElementById('statusLabel');
  const live = s === 'live', conn = s === 'connecting';

  dot.className = 'status-dot' + (live ? ' live' : conn ? ' connecting' : '');
  label.className = 'status-label' + (live ? ' live' : conn ? ' connecting' : '');
  label.textContent = live ? 'live' : conn ? 'connecting' : 'idle';

  document.getElementById('startGroup').style.display = (live || conn) ? 'none' : 'block';
  document.getElementById('liveGroup').style.display = live ? 'block' : 'none';
  document.getElementById('hint').style.display = live ? 'block' : 'none';
  document.getElementById('caps').style.display = (live || conn) ? 'flex' : 'none';

  window.edge.setSessionStatus(live ? 'live' : 'idle');
}

function setCap(name, on) {
  document.getElementById('cap' + name + 'Dot').className = 'cap-dot' + (on ? ' on' : '');
  document.getElementById('cap' + name + 'Name').className = 'cap-name' + (on ? ' on' : '');
}

function showInfo(m) {
  const e = document.getElementById('infoBox');
  e.textContent = m;
  e.style.display = m ? 'block' : 'none';
}
function showErr(m) {
  const e = document.getElementById('errBox');
  e.textContent = m;
  e.style.display = m ? 'block' : 'none';
  if (m) showInfo('');
}

function pushLog(w) {
  if (logEmpty) {
    document.getElementById('logEmpty').style.display = 'none';
    logEmpty = false;
  }
  const log = document.getElementById('log');
  const div = document.createElement('div');
  const isAudio = w.type === 'audio_whisper';
  const hi = w.urgency === 'high';

  div.className = 'log-item' + (isAudio ? ' audio' : hi ? ' high' : '');

  const t = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  const tag = isAudio ? 'whisper' : (LABELS[w.category] || 'Insight');
  const tagClass = isAudio ? ' audio' : hi ? ' high' : '';
  const text = isAudio ? 'Audio coaching delivered.' : w.text;

  div.innerHTML = `<span class="log-time">${t}</span><div class="log-bar"></div><div class="log-content"><div class="log-tag${tagClass}">${tag}</div><div class="log-text">${text}</div></div>`;

  if (!isAudio) window.edge.sendWhisper(w);
  log.insertBefore(div, log.firstChild);
}

async function playAudioWhisper(b64, sr) {
  try {
    const ctx = new AudioContext({sampleRate: sr || 24000});
    const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const i16 = new Int16Array(raw.buffer);
    const f32 = new Float32Array(i16.length);
    for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768.0;
    const buf = ctx.createBuffer(1, f32.length, sr || 24000);
    buf.copyToChannel(f32, 0);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start();
    window.edge.sendWhisper({text: 'Audio coaching in your ear', urgency: 'normal', category: 'insight', isAudio: true});
    src.onended = () => ctx.close();
  } catch(e) { console.error('Audio:', e); }
}

async function startScreenCapture() {
  try {
    const sources = await window.edge.getSources();
    if (!sources || !sources.length) return;
    screenStream = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: {mandatory: {chromeMediaSource:'desktop', chromeMediaSourceId: sources[0].id, maxWidth:1280, maxHeight:720, maxFrameRate:1}}
    });
    setCap('Screen', true);
    const canvas = document.createElement('canvas'), ctx2d = canvas.getContext('2d');
    canvas.width = 640; canvas.height = 360;
    const video = document.createElement('video');
    video.srcObject = screenStream; video.muted = true; await video.play();
    screenInterval = setInterval(() => {
      if (!ws || ws.readyState !== 1) return;
      try {
        ctx2d.drawImage(video, 0, 0, canvas.width, canvas.height);
        const b64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
        ws.send(JSON.stringify({type:'screen', payload: b64}));
      } catch(e) {}
    }, 5000);
  } catch(e) { console.log('Screen skipped:', e.message); }
}

function startDemo() {
  showErr(''); showInfo(''); setStatus('live');
  setCap('Mic', false); setCap('Screen', false); setCap('AI', true);
  demoIdx = 0;
  pushLog(DEMO[demoIdx++ % DEMO.length]);
  demoInterval = setInterval(() => pushLog(DEMO[demoIdx++ % DEMO.length]), 5000);
}

async function startLive() {
  showErr(''); showInfo('Connecting...'); setStatus('connecting');
  document.getElementById('btnLive').disabled = true;
  try {
    const wsUrl = await window.edge.getWsUrl();
    ws = new WebSocket(wsUrl + '/ws/session');
    ws.onopen = async () => {
      showInfo('Requesting mic...');
      try {
        micStream = await navigator.mediaDevices.getUserMedia({audio:{sampleRate:16000,channelCount:1,echoCancellation:true,noiseSuppression:true}});
        setCap('Mic', true); setCap('AI', true); setStatus('live'); showInfo('');
        micCtx = new AudioContext({sampleRate: 16000});
        const src = micCtx.createMediaStreamSource(micStream);
        processor = micCtx.createScriptProcessor(4096, 1, 1);
        processor.onaudioprocess = (e) => {
          if (!ws || ws.readyState !== 1) return;
          const f = e.inputBuffer.getChannelData(0);
          const p = new Int16Array(f.length);
          for (let i = 0; i < f.length; i++) {
            const c = Math.max(-1, Math.min(1, f[i]));
            p[i] = c < 0 ? c * 32768 : c * 32767;
          }
          const b64 = btoa(String.fromCharCode(...new Uint8Array(p.buffer)));
          ws.send(JSON.stringify({type:'audio', payload: b64}));
        };
        src.connect(processor); processor.connect(micCtx.destination);
        startScreenCapture().catch(() => {});
      } catch(e) {
        showErr('Mic blocked. Enable in System Settings → Privacy.');
        setStatus('idle');
      }
    };
    ws.onmessage = async (e) => {
      try {
        const d = JSON.parse(e.data);
        if (d.type === 'whisper') pushLog(d);
        else if (d.type === 'audio_whisper') { await playAudioWhisper(d.audio, d.sample_rate); pushLog({type:'audio_whisper'}); }
        else if (d.type === 'error') showErr(d.message);
      } catch(err) {}
    };
    ws.onerror = () => { showErr('Backend unreachable on :8080'); setStatus('idle'); };
    ws.onclose = () => { if (ws) setStatus('idle'); };
  } catch(e) { showErr(e.message); setStatus('idle'); }
  document.getElementById('btnLive').disabled = false;
}

function stop() {
  try { if (ws) { ws.send(JSON.stringify({type:'stop'})); ws.close(); } ws = null; } catch(e) {}
  try { if (processor) processor.disconnect(); processor = null; } catch(e) {}
  try { if (micCtx) micCtx.close(); micCtx = null; } catch(e) {}
  try { if (micStream) micStream.getTracks().forEach(t => t.stop()); micStream = null; } catch(e) {}
  try { if (screenStream) screenStream.getTracks().forEach(t => t.stop()); screenStream = null; } catch(e) {}
  if (screenInterval) { clearInterval(screenInterval); screenInterval = null; }
  if (demoInterval) { clearInterval(demoInterval); demoInterval = null; }
  window.edge.hideOverlay(); setStatus('idle'); showInfo(''); showErr('');
  setCap('Mic', false); setCap('Screen', false); setCap('AI', false);
}

document.getElementById('btnLive').addEventListener('click', startLive);
document.getElementById('btnDemo').addEventListener('click', startDemo);
document.getElementById('btnStop').addEventListener('click', stop);
window.edge.onTriggerDemo(() => pushLog(DEMO[demoIdx++ % DEMO.length]));

window.edge.onTrayStartLive(() => startLive());
window.edge.onTrayStartDemo(() => startDemo());
window.edge.onTrayStop(() => stop());
</script>
</body>
</html>
